name: Deploy to GCP Compute Engine

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ vars.GCP_PROJECT_ID }}

    - name: Deploy via SSH
      run: |
        gcloud compute ssh githubgcp \
          --zone="northamerica-northeast2-b" \
          --command="
            mkdir -p ~/github-gcp && cd ~/github-gcp
            if [ ! -d .git ]; then
              git clone https://github.com/hnsandeep/github-gcp.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi
            # Add any application build/restart commands here (e.g., npm install)
          "
